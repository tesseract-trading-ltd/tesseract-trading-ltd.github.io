<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Tesseract Trading — Form A · Schlegel diagram of the 4-cube</title>
  <!-- Brand-guide tesseract a-paper / a-slate, scaled so the outer
       cube reaches the viewBox edges (~1.36×). The opaque
       paper-coloured background that the previous version painted
       behind the diagram is removed so the favicon is transparent
       on dark browser chrome; ink switches to cream via
       prefers-color-scheme so the SVG reads correctly in either
       light or dark tab bars. -->
  <style>
    .ink { stroke: #0F1115; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #EDE9DD; }
    }
  </style>
  <g class="ink" fill="none" stroke-width="2.6" stroke-linejoin="miter">
    <rect x="2" y="2" width="60" height="60"/>
    <rect x="18" y="18" width="28" height="28"/>
    <line x1="2" y1="2" x2="18" y2="18"/>
    <line x1="62" y1="2" x2="46" y2="18"/>
    <line x1="2" y1="62" x2="18" y2="46"/>
    <line x1="62" y1="62" x2="46" y2="46"/>
  </g>
</svg>
