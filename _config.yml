# Tesseract Trading — GitHub Pages Configuration
# High-Dimensional Execution · Projectio per Geometriam

title: Tesseract Trading
description: A four-axis trading house — execution arm of The Alephain Guild. Projectio per Geometriam.
url: "https://tesseract.alephain.com"
baseurl: ""

brand:
  name: "Tesseract Trading"
  tagline: "Projectio per Geometriam"

markdown: kramdown
highlighter: rouge

exclude:
  - README.md
  - LICENSE
  - CNAME
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

include:
  - _headers
  - _redirects

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
